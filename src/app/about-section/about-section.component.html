<section class="about-section" id="sobre" aria-labelledby="about-title">
  <div class="about-section__bg-effect" aria-hidden="true"></div>

  <div class="about-section__container">
    <div class="about-section__header">
      <h2 class="about-section__title" id="about-title">{{ translations?.about?.title }}</h2>
      <p class="about-section__tagline">{{ translations?.about?.tagline }}</p>
    </div>

    <div class="about-section__content">
      <div class="about-section__intro">
        <div class="about-section__avatar">
          <img src="assets/images/icons/douglasFoto.jpg" alt="Douglas Leonardo" class="about-section__avatar-img"
            loading="eager" decoding="async">
          <div class="about-section__avatar-placeholder">
            <i class="fas fa-user"></i>
          </div>
        </div>
        <div class="about-section__bio">
          <p>{{ translations?.about?.bio1 }}</p>
          <div class="about-section__highlight">
            <i class="fas fa-quote-left"></i>
            <p>{{ translations?.about?.quote }}</p>
          </div>
        </div>
      </div>


      <div class="about-section__timeline">

        <details class="about-section__timeline-item" *ngFor="let item of timelineItems">

          <summary class="about-section__timeline-header">
            <div class="about-section__timeline-dot"></div>

            <div class="about-section__timeline-summary">
              <span class="about-section__timeline-company">{{ item.company }}</span>
              <span class="about-section__timeline-period">{{ item.period[currentLanguage] }}</span>
            </div>

            <span class="about-section__timeline-toggle" aria-hidden="true">
              <i class="fas fa-chevron-down"></i>
            </span>
          </summary>

          <div class="about-section__timeline-content">
            <article class="about-section__timeline-role" *ngFor="let role of item.roles">
              <div class="about-section__timeline-role-header">
                <h3>{{ role.title[currentLanguage] }}</h3>
                <span>{{ role.period[currentLanguage] }}</span>
              </div>

              <p [innerHTML]="role.description[currentLanguage]"></p>
            </article>
          </div>

        </details>


      </div>
    </div>
  </div>
</section>
